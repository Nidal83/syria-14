<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Golden hour sky: deep navy → royal blue → amber → gold at horizon -->
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#050B16"/>
      <stop offset="30%"  stop-color="#0B1C32"/>
      <stop offset="60%"  stop-color="#163352"/>
      <stop offset="80%"  stop-color="#6B3D12"/>
      <stop offset="92%"  stop-color="#C4922A"/>
      <stop offset="100%" stop-color="#E8C250"/>
    </linearGradient>
    <!-- Sun glow burst at horizon -->
    <radialGradient id="sunHalo" cx="50%" cy="100%" r="45%">
      <stop offset="0%"   stop-color="#FFD97D" stop-opacity="0.75"/>
      <stop offset="35%"  stop-color="#E8B84B" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C4922A" stop-opacity="0"/>
    </radialGradient>
    <!-- Moon soft glow -->
    <radialGradient id="moonHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#E8D5A0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#E8D5A0" stop-opacity="0"/>
    </radialGradient>
    <!-- Far mountain gradient -->
    <linearGradient id="mtn1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2A3A"/>
      <stop offset="100%" stop-color="#0F1822"/>
    </linearGradient>
    <!-- Near mountain gradient -->
    <linearGradient id="mtn2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111C28"/>
      <stop offset="100%" stop-color="#080E18"/>
    </linearGradient>
    <!-- Building silhouette -->
    <linearGradient id="bldg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E1820"/>
      <stop offset="100%" stop-color="#050A10"/>
    </linearGradient>
    <!-- Ground golden mist -->
    <linearGradient id="groundMist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4922A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#C4922A" stop-opacity="0.14"/>
    </linearGradient>
    <!-- Gold glow filter for minarets -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ═══ SKY ═══ -->
  <rect width="1920" height="800" fill="url(#skyGrad)"/>
  <ellipse cx="960" cy="800" rx="720" ry="320" fill="url(#sunHalo)"/>

  <!-- ═══ STARS ═══ -->
  <g fill="#E8D5A3">
    <circle cx="115"  cy="68"  r="1.2" opacity="0.9"/>
    <circle cx="248"  cy="42"  r="0.9" opacity="0.7"/>
    <circle cx="390"  cy="92"  r="1.4" opacity="0.8"/>
    <circle cx="530"  cy="52"  r="0.9" opacity="0.65"/>
    <circle cx="660"  cy="82"  r="1.2" opacity="0.85"/>
    <circle cx="790"  cy="32"  r="0.8" opacity="0.7"/>
    <circle cx="865"  cy="108" r="1.0" opacity="0.6"/>
    <circle cx="1055" cy="42"  r="1.2" opacity="0.8"/>
    <circle cx="1190" cy="72"  r="0.9" opacity="0.65"/>
    <circle cx="1330" cy="38"  r="1.4" opacity="0.9"/>
    <circle cx="1470" cy="82"  r="0.8" opacity="0.7"/>
    <circle cx="1595" cy="52"  r="1.2" opacity="0.8"/>
    <circle cx="1720" cy="88"  r="0.9" opacity="0.65"/>
    <circle cx="1848" cy="62"  r="1.2" opacity="0.85"/>
    <circle cx="315"  cy="142" r="0.8" opacity="0.5"/>
    <circle cx="715"  cy="122" r="1.0" opacity="0.55"/>
    <circle cx="1110" cy="112" r="0.8" opacity="0.5"/>
    <circle cx="1530" cy="128" r="1.0" opacity="0.55"/>
    <circle cx="1788" cy="108" r="0.8" opacity="0.5"/>
    <circle cx="460"  cy="168" r="0.7" opacity="0.4"/>
    <circle cx="940"  cy="148" r="0.7" opacity="0.4"/>
    <circle cx="1400" cy="158" r="0.7" opacity="0.4"/>
  </g>

  <!-- ═══ CRESCENT MOON ═══ -->
  <g transform="translate(1700,118)">
    <circle r="58" fill="url(#moonHalo)"/>
    <circle r="33" fill="#EDD49C" filter="url(#glow)" opacity="0.96"/>
    <circle cx="15" cy="-11" r="28" fill="#0B1C32"/>
  </g>
  <!-- Star beside moon -->
  <g transform="translate(1650,132) scale(0.65)" fill="#E8D5A3" opacity="0.78">
    <path d="M0,-13 L2.8,-4 L12,-4 L5,1.5 L7.8,11 L0,5.5 L-7.8,11 L-5,1.5 L-12,-4 L-2.8,-4Z"/>
  </g>

  <!-- ═══ FAR MOUNTAINS (Anti-Lebanon range) ═══ -->
  <path d="M0,525
    C100,450 180,470 260,395
    C340,320 430,405 520,355
    C610,305 700,375 800,310
    C900,245 990,315 1080,280
    C1170,245 1260,310 1360,275
    C1460,240 1550,320 1650,295
    C1750,270 1840,335 1920,310
    L1920,800 L0,800 Z"
    fill="url(#mtn1)" opacity="0.58"/>

  <!-- ═══ NEAR MOUNTAINS ═══ -->
  <path d="M0,595
    C80,510 170,545 280,470
    C390,395 480,460 590,410
    C700,360 790,435 900,385
    C1010,335 1100,415 1210,380
    C1320,345 1420,420 1540,385
    C1660,350 1760,420 1860,390
    L1920,400 L1920,800 L0,800 Z"
    fill="url(#mtn2)" opacity="0.72"/>

  <!-- ═══════════════════════════════════════ -->
  <!-- LEFT CITY — residential & ancient quarter -->
  <!-- ═══════════════════════════════════════ -->
  <g fill="url(#bldg)">
    <!-- Far-left low cluster -->
    <rect x="0"   y="618" width="48"  height="182"/>
    <rect x="38"  y="598" width="42"  height="202"/>
    <rect x="70"  y="608" width="55"  height="192"/>
    <!-- Left minaret 1 -->
    <rect x="120" y="526" width="10"  height="274"/>
    <rect x="115" y="550" width="20"  height="9"/>
    <rect x="117" y="572" width="16"  height="7"/>
    <polygon points="115,526 130,526 122.5,502" fill="#C4922A" opacity="0.88" filter="url(#softGlow)"/>
    <g transform="translate(122.5,495)" filter="url(#glow)">
      <circle r="5" fill="#EDD49C" opacity="0.92"/>
      <circle cx="2.2" cy="-1.5" r="4.2" fill="#0B1C32"/>
    </g>
    <!-- Mid-left cluster -->
    <rect x="140" y="588" width="72"  height="212"/>
    <rect x="202" y="566" width="52"  height="234"/>
    <rect x="245" y="550" width="68"  height="250"/>
    <!-- Arched roofline -->
    <path d="M245,550 Q279,530 313,550" fill="#0B1520"/>
    <rect x="305" y="558" width="58"  height="242"/>
    <!-- Domed building left -->
    <rect x="358" y="596" width="78"  height="204"/>
    <path d="M358,596 Q397,564 436,596" fill="#0D1A24"/>
    <!-- Left-2 cluster -->
    <rect x="430" y="568" width="62"  height="232"/>
    <rect x="482" y="578" width="48"  height="222"/>
    <!-- Tall corner tower -->
    <rect x="528" y="514" width="32"  height="286"/>
    <rect x="524" y="508" width="40"  height="10"/>
    <rect x="528" y="498" width="32"  height="12"/>
    <rect x="532" y="490" width="24"  height="10"/>
    <rect x="536" y="483" width="16"  height="9"/>
    <!-- Left-3 cluster -->
    <rect x="568" y="572" width="62"  height="228"/>
    <rect x="618" y="558" width="52"  height="242"/>
    <!-- Left minaret 2 -->
    <rect x="668" y="495" width="11"  height="305"/>
    <rect x="663" y="520" width="21"  height="9"/>
    <rect x="665" y="544" width="17"  height="7"/>
    <polygon points="663,495 679,495 671,470" fill="#C4922A" opacity="0.9" filter="url(#softGlow)"/>
    <g transform="translate(671,463)" filter="url(#glow)">
      <circle r="5.5" fill="#EDD49C" opacity="0.92"/>
      <circle cx="2.5" cy="-1.8" r="4.6" fill="#0B1C32"/>
    </g>
    <rect x="682" y="578" width="56"  height="222"/>
    <rect x="728" y="590" width="44"  height="210"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- CENTER — UMAYYAD MOSQUE OF DAMASCUS    -->
  <!-- ═══════════════════════════════════════ -->
  <g transform="translate(762,0)">
    <!-- Outer compound walls -->
    <rect x="-55" y="598" width="510" height="202" fill="url(#bldg)"/>

    <!-- Main prayer hall -->
    <rect x="0" y="525" width="400" height="275" fill="#0E1820"/>

    <!-- Decorative arcade (colonnaded courtyard row) -->
    <rect x="8" y="542" width="384" height="38" fill="#0A1318"/>

    <!-- Arcade arched openings (10 arches) -->
    <g fill="#060C12">
      <path d="M18,544  Q32,532 46,544  L46,580 L18,580Z"/>
      <path d="M57,544  Q71,532 85,544  L85,580 L57,580Z"/>
      <path d="M96,544  Q110,532 124,544 L124,580 L96,580Z"/>
      <path d="M135,544 Q149,532 163,544 L163,580 L135,580Z"/>
      <path d="M174,544 Q188,532 202,544 L202,580 L174,580Z"/>
      <path d="M211,544 Q225,532 239,544 L239,580 L211,580Z"/>
      <path d="M248,544 Q262,532 276,544 L276,580 L248,580Z"/>
      <path d="M285,544 Q299,532 313,544 L313,580 L285,580Z"/>
      <path d="M322,544 Q336,532 350,544 L350,580 L322,580Z"/>
      <path d="M359,544 Q373,532 387,544 L387,580 L359,580Z"/>
    </g>

    <!-- Central dome base drum -->
    <rect x="138" y="465" width="124" height="64" fill="#0E1820"/>
    <!-- Dome (pointed Ottoman style) -->
    <path d="M138,465 Q162,420 200,408 Q238,420 262,465Z" fill="#111E28"/>
    <!-- Dome highlight arc (gold) -->
    <path d="M145,460 Q200,428 255,460" fill="none" stroke="#C4922A" stroke-width="1.8" stroke-opacity="0.55"/>
    <!-- Dome finial shaft -->
    <rect x="196" y="405" width="8" height="26" fill="#C4922A" opacity="0.82" filter="url(#softGlow)"/>
    <polygon points="196,405 204,405 200,386" fill="#C4922A" opacity="0.95" filter="url(#glow)"/>
    <!-- Crescent on dome -->
    <g transform="translate(200,379)" filter="url(#glow)">
      <circle r="6" fill="#EDD49C" opacity="0.95"/>
      <circle cx="2.5" cy="-2" r="5" fill="#0E1820"/>
    </g>

    <!-- ─── LEFT MINARET (Minaret of the Bride) ─── -->
    <rect x="-28" y="408" width="22" height="390" fill="#0E1820"/>
    <!-- Tier belt decorations -->
    <rect x="-32" y="440" width="30" height="9"  fill="#0A1318"/>
    <rect x="-32" y="472" width="30" height="8"  fill="#0A1318"/>
    <rect x="-32" y="500" width="30" height="8"  fill="#0A1318"/>
    <!-- Minaret cap -->
    <rect x="-24" y="390" width="18" height="22" fill="#C4922A" opacity="0.88" filter="url(#softGlow)"/>
    <polygon points="-24,390 -6,390 -15,366" fill="#C4922A" opacity="0.95" filter="url(#glow)"/>
    <g transform="translate(-15,358)" filter="url(#glow)">
      <circle r="7" fill="#EDD49C" opacity="0.95"/>
      <circle cx="3" cy="-2.2" r="5.8" fill="#0B1C32"/>
    </g>

    <!-- ─── RIGHT MINARET (Minaret of Jesus) ─── -->
    <rect x="406" y="408" width="22" height="390" fill="#0E1820"/>
    <rect x="402" y="440" width="30" height="9"  fill="#0A1318"/>
    <rect x="402" y="472" width="30" height="8"  fill="#0A1318"/>
    <rect x="402" y="500" width="30" height="8"  fill="#0A1318"/>
    <rect x="406" y="390" width="18" height="22" fill="#C4922A" opacity="0.88" filter="url(#softGlow)"/>
    <polygon points="406,390 424,390 415,366" fill="#C4922A" opacity="0.95" filter="url(#glow)"/>
    <g transform="translate(415,358)" filter="url(#glow)">
      <circle r="7" fill="#EDD49C" opacity="0.95"/>
      <circle cx="3" cy="-2.2" r="5.8" fill="#0B1C32"/>
    </g>

    <!-- ─── TALL CENTER MINARET (Qaitbay minaret) ─── -->
    <rect x="185" y="322" width="18" height="480" fill="#0E1820"/>
    <!-- Gold tier rings -->
    <rect x="180" y="362" width="28" height="11" fill="#C4922A" opacity="0.62" filter="url(#softGlow)"/>
    <rect x="180" y="405" width="28" height="9"  fill="#C4922A" opacity="0.42"/>
    <rect x="180" y="445" width="28" height="8"  fill="#C4922A" opacity="0.28"/>
    <!-- Upper shaft -->
    <rect x="187" y="322" width="14" height="48" fill="#0A1318"/>
    <!-- Cap tower -->
    <rect x="187" y="296" width="14" height="28" fill="#C4922A" opacity="0.90" filter="url(#softGlow)"/>
    <polygon points="187,296 201,296 194,272" fill="#C4922A" opacity="0.96" filter="url(#glow)"/>
    <!-- Crescent at top -->
    <g transform="translate(194,263)" filter="url(#glow)">
      <circle r="8" fill="#EDD49C" opacity="0.98"/>
      <circle cx="3.5" cy="-2.5" r="6.6" fill="#0B1C32"/>
    </g>

    <!-- Mosque main gate / portal -->
    <rect x="152" y="578" width="96" height="120" fill="#0A1318"/>
    <path d="M152,578 Q200,546 248,578" fill="#0A1318"/>
    <!-- Gold arch trim on gate -->
    <path d="M155,578 Q200,549 245,578" fill="none" stroke="#C4922A" stroke-width="2.2" stroke-opacity="0.55"/>
    <!-- Gate door details -->
    <rect x="168" y="608" width="28" height="90" fill="#060C12"/>
    <rect x="204" y="608" width="28" height="90" fill="#060C12"/>
  </g>

  <!-- ═══════════════════════════════════════ -->
  <!-- RIGHT CITY — modern & mixed quarter    -->
  <!-- ═══════════════════════════════════════ -->
  <g fill="url(#bldg)">
    <rect x="1222" y="572" width="58"  height="228"/>
    <rect x="1270" y="556" width="46"  height="244"/>
    <!-- Right minaret 1 -->
    <rect x="1308" y="492" width="11"  height="308"/>
    <rect x="1303" y="518" width="21"  height="9"/>
    <rect x="1305" y="542" width="17"  height="7"/>
    <polygon points="1303,492 1319,492 1311,467" fill="#C4922A" opacity="0.9" filter="url(#softGlow)"/>
    <g transform="translate(1311,460)" filter="url(#glow)">
      <circle r="5.5" fill="#EDD49C" opacity="0.92"/>
      <circle cx="2.5" cy="-1.8" r="4.6" fill="#0B1C32"/>
    </g>
    <!-- R-1 cluster -->
    <rect x="1328" y="562" width="66"  height="238"/>
    <rect x="1384" y="576" width="50"  height="224"/>
    <rect x="1428" y="546" width="72"  height="254"/>
    <!-- Domed building right -->
    <rect x="1494" y="574" width="72"  height="226"/>
    <path d="M1494,574 Q1530,542 1566,574" fill="#0D1A24"/>
    <!-- Modern office tower -->
    <rect x="1558" y="506" width="38"  height="294"/>
    <rect x="1554" y="500" width="46"  height="10"/>
    <rect x="1558" y="490" width="38"  height="12"/>
    <rect x="1562" y="481" width="30"  height="11"/>
    <rect x="1566" y="473" width="22"  height="10"/>
    <!-- R-2 cluster -->
    <rect x="1602" y="562" width="56"  height="238"/>
    <rect x="1648" y="576" width="46"  height="224"/>
    <!-- Right minaret 2 -->
    <rect x="1692" y="502" width="10"  height="298"/>
    <rect x="1687" y="528" width="20"  height="8"/>
    <rect x="1689" y="550" width="16"  height="7"/>
    <polygon points="1687,502 1702,502 1694.5,477" fill="#C4922A" opacity="0.87" filter="url(#softGlow)"/>
    <g transform="translate(1694.5,470)" filter="url(#glow)">
      <circle r="5" fill="#EDD49C" opacity="0.9"/>
      <circle cx="2.2" cy="-1.5" r="4.2" fill="#0B1C32"/>
    </g>
    <!-- R-3 cluster -->
    <rect x="1706" y="572" width="56"  height="228"/>
    <rect x="1752" y="558" width="46"  height="242"/>
    <rect x="1792" y="572" width="62"  height="228"/>
    <rect x="1846" y="582" width="50"  height="218"/>
    <rect x="1886" y="602" width="34"  height="198"/>
  </g>

  <!-- ═══ ATMOSPHERIC GROUND MIST ═══ -->
  <rect x="0" y="628" width="1920" height="172" fill="url(#groundMist)"/>

  <!-- ═══ GROUND LINE ═══ -->
  <rect x="0" y="792" width="1920" height="8" fill="#040810"/>
</svg>
